# Build libcvextern.dylib for macOS x64 and arm64 on GitHub-hosted Mac runners.
#
# This workflow assumes it lives at <repo-root>/.github/workflows/build-macos.yml
# in a standalone repo where the build scripts are at the repo root.
#
# Triggers:
#   * workflow_dispatch -- manual run from the Actions tab.
#   * push -- on tags matching opencv-v*.
#
# Public repo: free unlimited GitHub Actions minutes.

name: Build macOS libcvextern

on:
  workflow_dispatch:
    inputs:
      emgu_tag:
        description: 'Emgu CV git tag to build'
        required: true
        default: '4.12.0'
      arch:
        description: 'Architecture'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - x64
          - arm64
      portable:
        description: 'Apply AgentDVR-minimal patches (BUILD_LIST + CUDA stubs + size cuts)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    tags:
      - 'opencv-v*'

jobs:
  build:
    # macos-14 is Apple Silicon (arm64). We cross-compile x86_64 from it via clang -arch.
    runs-on: macos-14

    timeout-minutes: 180   # 3 hours hard limit; typical run is 60-90 min.

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew update --quiet
          brew install --quiet cmake git || true
          cmake --version
          git --version
          clang --version

      - name: Install .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine Emgu tag
        id: emgu
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.emgu_tag }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            RAW="${GITHUB_REF#refs/tags/opencv-v}"
          else
            RAW="4.12.0"
          fi
          # Emgu's git tags are X.Y.Z. Their NuGet package versions add a .RRRR build
          # revision (e.g. 4.12.0.5764) that is NOT a git tag. Extract just the X.Y.Z so
          # that "opencv-v4.12.0" and "opencv-v4.12.0.5764" both build the right Emgu tag.
          EMGU_TAG="$(echo "$RAW" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+' || echo "$RAW")"
          echo "tag=$EMGU_TAG"        >> "$GITHUB_OUTPUT"
          echo "raw_version=$RAW"     >> "$GITHUB_OUTPUT"
          echo "Tag input:    $RAW"
          echo "Emgu git tag: $EMGU_TAG"

      - name: Cache emgucv source clone
        uses: actions/cache@v4
        with:
          path: src/emgucv
          key: emgucv-src-${{ steps.emgu.outputs.tag }}-v1

      - name: Build
        env:
          EMGU_TAG: ${{ steps.emgu.outputs.tag }}
          PORTABLE: ${{ github.event.inputs.portable || 'true' }}
        run: |
          chmod +x build-macos.sh
          ARCH="${{ github.event.inputs.arch || 'both' }}"
          if [ "${PORTABLE}" = "true" ]; then PORTABLE=1; else PORTABLE=0; fi
          export PORTABLE
          ./build-macos.sh "$ARCH"

      - name: Show output sizes
        run: |
          echo "=== out/ contents ==="
          ls -lh out/ out/macos-* 2>/dev/null || true
          echo ""
          echo "=== dylib details ==="
          find out -name 'libcvextern.dylib' -exec file {} \; -exec du -h {} \; -exec otool -L {} \;

      - name: Upload macos-x64 artifact
        if: ${{ github.event.inputs.arch != 'arm64' }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: out/macos-x64.zip
          if-no-files-found: warn
          retention-days: 30

      - name: Upload macos-arm64 artifact
        if: ${{ github.event.inputs.arch != 'x64' }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: out/macos-arm64.zip
          if-no-files-found: warn
          retention-days: 30

      - name: Attach to GitHub Release (on tag push only)
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/opencv-v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/macos-x64.zip
            out/macos-arm64.zip
          fail_on_unmatched_files: false
